# Veridia RAG Configuration
# Override any setting via environment variables or .env file

embedding:
  model_name: "all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 64
  normalize: true

chunking:
  strategy: "contextual"          # fixed, recursive, semantic, markdown, contextual
  chunk_size: 512
  chunk_overlap: 50
  semantic_threshold: 0.5        # for semantic chunking

retrieval:
  top_k: 10
  similarity_threshold: 0.3
  dense_weight: 0.6
  sparse_weight: 0.4
  rrf_k: 60                     # RRF constant

reranking:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

generation:
  ollama_host: "http://127.0.0.1:11434"
  model: "qwen2.5:3b"
  temperature: 0.1
  max_tokens: 2048
  stream: true

vectorstore:
  persist_dir: "./data/chromadb"
  collection_name: "default_collection"

logging:
  level: "INFO"
  file: "logs/veridia.log"
  rotation: "10 MB"
  retention: "7 days"

ingestion:
  supported_extensions:
    - ".pdf"
    - ".docx"
    - ".md"
    - ".txt"
    - ".py"
    - ".js"
    - ".ts"
    - ".java"
    - ".c"
    - ".cpp"
    - ".go"
    - ".rs"
    - ".html"
    - ".css"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".toml"
  max_file_size_mb: 50
